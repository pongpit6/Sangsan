<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Planner v2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="month-nav">
            <button class="btn-nav" onclick="changeMonth(-1)">&#10094;</button>
            <h2 id="currentMonthLabel">กำลังโหลด...</h2>
            <button class="btn-nav" onclick="changeMonth(1)">&#10095;</button>
        </div>
        <div class="actions">
            <button class="btn-primary" onclick="openForm()">+ เพิ่มคิวงาน</button>
        </div>
    </header>

    <div class="calendar-card">
        <div class="week-labels">
            <div>อาทิตย์</div><div>จันทร์</div><div>อังคาร</div><div>พุธ</div><div>พฤหัสบดี</div><div>ศุกร์</div><div>เสาร์</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div id="dayModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-x" onclick="closeModal('dayModal')">&times;</button>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="dayTitle" style="margin:0">รายละเอียดงาน</h2>
                <button class="btn-primary" onclick="openForm()">+ เพิ่มงานวันนี้</button>
            </div>
            <div id="detailList"></div>
            <div class="modal-footer">
                <button class="btn-full btn-gray" onclick="closeModal('dayModal')">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-x" onclick="closeModal('taskModal')">&times;</button>
            <h2 id="formTitle">บันทึกงาน</h2>
            <form id="taskForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="field"><label>วันที่</label><input type="date" id="postDate" required></div>
                    <div class="field"><label>เวลา</label><input type="time" id="postTime"></div>
                </div>
                <div class="form-grid">
                    <div class="field"><label>ลูกค้า</label><select id="clientName" required></select></div>
                    <div class="field"><label>ประเภทงาน</label><select id="taskType" required></select></div>
                </div>
                <div class="field"><label>แพลตฟอร์ม</label><select id="platform"></select></div>
                <div class="field"><label>ลิงก์งาน</label><input type="url" id="contentLink" placeholder="https://..."></div>
                <div class="field"><label>หมายเหตุ</label><textarea id="notes" rows="3"></textarea></div>
                <div class="modal-footer">
                    <button type="button" class="btn-full btn-gray" onclick="closeModal('taskModal')">ยกเลิก</button>
                    <button type="submit" id="saveBtn" class="btn-full btn-primary">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
